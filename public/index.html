<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Olimpiadas - levantamiento de respuestas</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-view="loginView">
    <main class="shell">
      <section class="topbar">
        <div>
          <img class="brand-logo" src="/assets/desafiat-logo.png" alt="DesafíaT-TP Olimpiadas Tecnológicas 2026" />
          <p class="eyebrow">Etapa Hackathon</p>
          <h1 id="pageTitle">Levantamiento de respuestas</h1>
        </div>
      </section>

      <section id="loginView" class="view active">
        <section class="login-card">
          <h2 id="loginTitle">Ingreso</h2>
          <label>
            Usuario
            <input id="loginUser" autocomplete="username" />
          </label>
          <label>
            Clave
            <input id="loginPass" type="password" autocomplete="current-password" />
          </label>
          <button id="loginButton" class="primary" type="button">Entrar</button>
          <p id="loginHint" class="hint"></p>
        </section>
      </section>

    </main>
    <script src="/app.js"></script>
  </body>
</html>
