name: Actualizar VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Actualizar servidor de produccion
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd /opt/hackathon-olimpiadas

            STAMP="$(date +%Y%m%d-%H%M%S)"
            [ -f data.json ] && cp data.json "data.backup-auto-deploy-${STAMP}.json"
            [ -f responses-db.json ] && cp responses-db.json "responses-db.backup-auto-deploy-${STAMP}.json"

            git fetch origin main
            git reset --hard FETCH_HEAD

            [ -f "data.backup-auto-deploy-${STAMP}.json" ] && cp "data.backup-auto-deploy-${STAMP}.json" data.json
            [ -f "responses-db.backup-auto-deploy-${STAMP}.json" ] && cp "responses-db.backup-auto-deploy-${STAMP}.json" responses-db.json

            npm install --omit=dev
            node --check server.js
            node --check public/app.js
            pm2 restart olimpiadas
            pm2 status olimpiadas
